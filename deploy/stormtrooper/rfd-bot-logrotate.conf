# logrotate config for rfd-discord-bot persistent log file
# Install: sudo ln -sf /home/paul/agent-work/repos/rfd-discord-bot/deploy/stormtrooper/rfd-bot-logrotate.conf /etc/logrotate.d/rfd-discord-bot
# Or run manually: logrotate -v /home/paul/agent-work/repos/rfd-discord-bot/deploy/stormtrooper/rfd-bot-logrotate.conf

/home/paul/appdata/rfd-discord-bot/logs/bot.log {
    # Rotate daily
    daily

    # Keep 14 days of rotated logs
    rotate 14

    # Compress rotated logs (gzip)
    compress
    delaycompress

    # Don't error if log file is missing (e.g., container never started)
    missingok

    # Don't rotate empty files
    notifempty

    # Append date to rotated file names: bot.log-20260524.gz
    dateext
    dateformat -%Y%m%d

    # After rotation, send SIGHUP to the log tailer process so it re-opens
    # the log file. The watchdog will also re-attach on its next cycle.
    postrotate
        LOG_TAILER_PID_FILE=/home/paul/appdata/rfd-discord-bot/logs/bot-log-tailer.pid
        if [ -f "$LOG_TAILER_PID_FILE" ]; then
            kill "$(cat "$LOG_TAILER_PID_FILE")" 2>/dev/null || true
            rm -f "$LOG_TAILER_PID_FILE"
        fi
    endscript
}
