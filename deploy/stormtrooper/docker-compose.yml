name: rfd-discord-bot

services:
  postgres:
    image: postgres:17-alpine
    container_name: rfd-discord-bot-postgres
    restart: unless-stopped
    env_file:
      - ${RFD_BOT_ENV_FILE:-/opt/rfd-discord-bot/.env}
    environment:
      POSTGRES_DB: rfd_discord_bot
      POSTGRES_USER: rfd_bot
    volumes:
      - ${RFD_BOT_POSTGRES_DIR:-/srv/appdata/rfd-discord-bot/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rfd_bot -d rfd_discord_bot"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    container_name: rfd-discord-bot
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ${RFD_BOT_ENV_FILE:-/opt/rfd-discord-bot/.env}
    environment:
      PORT: "8080"
      MEMEXPRESS_CHROME_PROFILE_DIR: /data/memoryexpress-chrome
      SCRAPELAB_EXTERNAL_STEALTH_COMMAND: /opt/scrape-venv/bin/python /root/scripts/nodriver_fetch.py "{url}" --profile-dir /data/nodriver-profile --headless --wait-seconds 7
      SCRAPELAB_CAMOUFOX_COMMAND: xvfb-run -a /opt/scrape-venv/bin/python /root/scripts/camoufox_fetch.py "{url}" --wait-ms 7000
      SCRAPELAB_AI_CRAWLER_COMMAND: /opt/scrape-venv/bin/python /root/scripts/crawl4ai_fetch.py "{url}" --headless --wait-ms 7000
      EBAY_COUPON_EXTERNAL_STEALTH_COMMAND: /opt/scrape-venv/bin/python /root/scripts/nodriver_fetch.py "{url}" --profile-dir /data/nodriver-profile --headless --wait-seconds 7 --ebay-price-details
      EBAY_COUPON_CAMOUFOX_COMMAND: xvfb-run -a /opt/scrape-venv/bin/python /root/scripts/camoufox_fetch.py "{url}" --wait-ms 7000 --ebay-price-details
      EBAY_COUPON_AI_CRAWLER_COMMAND: /opt/scrape-venv/bin/python /root/scripts/crawl4ai_fetch.py "{url}" --headless --wait-ms 7000
      EBAY_COUPON_PAID_TRIAL_COMMAND: /opt/scrape-venv/bin/python /root/scripts/browserless_bql_fetch.py "{url}" --wait-ms 5000 --ebay-price-details
      BESTBUY_COMPUTE_EMBED_COMMAND: /opt/scrape-venv/bin/python /root/scripts/local_embed.py
      MEMEXPRESS_EXTERNAL_STEALTH_COMMAND: /opt/scrape-venv/bin/python /root/scripts/nodriver_fetch.py "{url}" --profile-dir /data/nodriver-profile --headless --wait-seconds 7
      MEMEXPRESS_CAMOUFOX_COMMAND: xvfb-run -a /opt/scrape-venv/bin/python /root/scripts/camoufox_fetch.py "{url}" --wait-ms 7000
      MEMEXPRESS_AI_CRAWLER_COMMAND: /opt/scrape-venv/bin/python /root/scripts/crawl4ai_fetch.py "{url}" --headless --wait-ms 7000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:18080:8080"
    volumes:
      - ${RFD_BOT_DATA_DIR:-/srv/appdata/rfd-discord-bot}:/data

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    env_file:
      - ${RFD_BOT_ENV_FILE:-/opt/rfd-discord-bot/.env}
    depends_on:
      - bot
    profiles:
      - tunnel
