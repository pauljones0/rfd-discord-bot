name: Build and Deploy to Cloud Run

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SERVICE_NAME: rfd-discord-bot
  REGION: us-central1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      GOOGLE_CLOUD_PROJECT_ID: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
      DISCORD_APP_ID: ${{ secrets.DISCORD_APP_ID }}
      DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
      DISCORD_PUBLIC_KEY: ${{ secrets.DISCORD_PUBLIC_KEY }}
      EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
      EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      PROXY_URL: ${{ secrets.PROXY_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          source: ./
          flags: '--memory=4Gi --cpu=2 --no-cpu-throttling --max-instances=3 --clear-base-image'
          env_vars: |
            GOOGLE_CLOUD_PROJECT=${{ env.GOOGLE_CLOUD_PROJECT_ID }}
            DISCORD_APP_ID=${{ env.DISCORD_APP_ID }}
            DISCORD_BOT_TOKEN=${{ env.DISCORD_BOT_TOKEN }}
            DISCORD_PUBLIC_KEY=${{ env.DISCORD_PUBLIC_KEY }}
            EBAY_CLIENT_ID=${{ env.EBAY_CLIENT_ID }}
            EBAY_CLIENT_SECRET=${{ env.EBAY_CLIENT_SECRET }}
            GEMINI_API_KEY=${{ env.GEMINI_API_KEY }}
            PROXY_URL=${{ env.PROXY_URL }}
